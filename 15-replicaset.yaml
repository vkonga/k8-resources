apiVersion: v1
kind: ReplicaSet
metadata:
  name: nginx
  labels:
    purpose: rs-demo
    project: electronic-shop
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      purpose: rs-demo
      project: electronic-shop
      app: nginx
template:
  metadata:
    labels:
      purpose: rs-demo
      project: electronic-shop
      app: nginx
  spec:
    containers:
      - name: nginx
        image: nginx